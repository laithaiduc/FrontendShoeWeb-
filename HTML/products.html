<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Products</title>
    <link rel="stylesheet" type="text/css" href="../CSS/products.css">
    <link rel="stylesheet" type="text/css" href="../CSS/header.css">
</head>

<body>
    <div id="header">
        <header class="main-header">
            <ul>
                <li class="logo"><a href="../home.html"><img src="../images/Logo.png" alt="Logo"></a></li>
                <li><a href="../home.html">Trang chủ</a></li>
                <li><a href="../products.html">Sản phẩm</a></li>
                <li><a href="../about.html">Giới thiệu</a></li>
                <li><a href="component/header.html"><button>Đăng xuất</button></a></li>
                <li><a href="../cart.html"> <img src="../images/shopping-cart (2).png" alt="Giỏ hàng"></a></li>
            </ul>
        </header>
    </div>
    <div class="introduce">
        <h1>Our Products</h1>
        <p>Welcome to our product page!</p>
    </div>
    <div class="select">
        <select class="filter" id="filter-price">
            <option value="" disabled selected hidden>Giá</option>
            <!-- disabled → không thể chọn được selected → mặc định hiển thị khi chưa chọn gì hidden → biến mất khi mở dropdown -->
            <option value="price1">Giá 1</option>
            <option value="price2">Giá 2</option>
            <option value="price3">Giá 3</option>
        </select>
        <select class="filter" id="filter-size">
            <option value="" disabled selected hidden>Kích cỡ</option>
            <!-- disabled → không thể chọn được selected → mặc định hiển thị khi chưa chọn gì hidden → biến mất khi mở dropdown -->
            <option value="size1">Size 1</option>
            <option value="size2">Size 2</option>
            <option value="size3">Size 3</option>
        </select>
        <select class="filter" id="filter-category">
            <option value="" disabled selected hidden>Loại giày </option>
            <!-- disabled → không thể chọn được selected → mặc định hiển thị khi chưa chọn gì hidden → biến mất khi mở dropdown -->
            <option value="category1">Category 1</option>
            <option value="category2">Category 2</option>
            <option value="category3">Category 3</option>
        </select>
        <select class="filter" id="filter-brand">
            <option value="" disabled selected hidden>Hãng</option>
            <!-- disabled → không thể chọn được selected → mặc định hiển thị khi chưa chọn gì hidden → biến mất khi mở dropdown -->
            <option value="brand1">Brand 1</option>
            <option value="brand2">Brand 2</option>
            <option value="brand3">Brand 3</option>
        </select>
        <select class="filter" id="filter-gender">
            <option value="" disabled selected hidden>Giới tính</option>
            <!-- disabled → không thể chọn được selected → mặc định hiển thị khi chưa chọn gì hidden → biến mất khi mở dropdown -->
            <option value="male">Nam</option>
            <option value="female">Nữ</option>
            <option value="unisex">Unisex</option>
        </select>
    </div>
    <div class="product-section">
        <div id="product-list" class="product-container"></div>
    </div>
</body>

</html>
